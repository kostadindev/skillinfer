site_name: skillinfer
site_url: https://kostadindev.github.io/skillinfer
site_description: Infer a full skill profile from a few observations. Few-shot capability estimation for AI agents and humans.
site_author: Kostadin Devedzhiev
repo_url: https://github.com/kostadindev/skillinfer
repo_name: kostadindev/skillinfer

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kostadindev/skillinfer
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/skillinfer/

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Core Concepts: getting-started/concepts.md
  - Tutorials:
    - LLM Benchmarks: tutorials/llm-benchmarks.md
    - O*NET — US occupations: tutorials/human-skills.md
    - ESCO — EU occupations: tutorials/european-skills.md
    - PIAAC — Individual adults: tutorials/piaac.md
    - Agent Orchestration: tutorials/orchestration.md
  - How It Works:
    - The Kalman Update: how-it-works/kalman-update.md
    - Covariance Estimation: how-it-works/covariance-estimation.md
    - Computational Cost: how-it-works/computational-cost.md
  - API Reference:
    - Population: api/population.md
    - Profile: api/profile.md
    - Datasets: api/datasets.md
    - Validation: api/validation.md
    - Visualization: api/visualization.md
